<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b6cb0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad)" rx="10"/>

  <!-- Cloud shape -->
  <g transform="translate(100, 80)">
    <ellipse cx="100" cy="80" rx="80" ry="50" fill="url(#cloudGrad)" opacity="0.9"/>
    <ellipse cx="50" cy="90" rx="50" ry="35" fill="url(#cloudGrad)" opacity="0.9"/>
    <ellipse cx="150" cy="90" rx="50" ry="35" fill="url(#cloudGrad)" opacity="0.9"/>
    <ellipse cx="100" cy="100" rx="90" ry="40" fill="url(#cloudGrad)" opacity="0.9"/>
  </g>

  <!-- VCF 9 Text -->
  <text x="200" y="180" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">VCF 9</text>

  <!-- Deployment Guide Text -->
  <text x="200" y="220" font-family="Arial, sans-serif" font-size="18" fill="#90cdf4" text-anchor="middle">Deployment Guide</text>

  <!-- Version badge -->
  <rect x="145" y="240" width="110" height="25" rx="12" fill="#48bb78"/>
  <text x="200" y="258" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">v9.0.0.0</text>
</svg>
